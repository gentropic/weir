<!-- weir v0.1 shell — two-pane layout. The rail's Sources list and the stream
     are rendered by src/js/ui/app.js; the status bar is wired by boot.js. -->
<div class="app">

  <!-- ── Source rail ── -->
  <aside class="rail">
    <div class="brand">
      <div class="glyph"></div>
      <span class="name">@gcu/<b>weir</b></span>
    </div>

    <nav class="rail-section">
      <div class="rail-label">Views</div>
      <div class="navrow active" data-view="inbox"><span class="lbl"><span class="ico ico-inbox">⬓</span> Inbox</span><span class="count" id="count-inbox">0</span></div>
      <div class="navrow" data-view="saved"><span class="lbl"><span class="ico">★</span> saved</span><span class="count" id="count-saved">0</span></div>
      <div class="navrow" data-view="archived"><span class="lbl"><span class="ico">▤</span> archived</span><span class="count" id="count-archived">0</span></div>
    </nav>

    <div class="rail-section">
      <div class="rail-label">Sources</div>
      <div id="sources"><div class="rail-empty">No sources yet</div></div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="topbar">
      <div class="title">
        <h1 id="view-title">Inbox</h1>
        <span class="sub" id="view-sub">no feeds yet</span>
      </div>
      <div class="actions">
        <input id="search-input" class="field" type="search" placeholder="search… (/)" autocomplete="off" spellcheck="false">
        <form id="addfeed" autocomplete="off">
          <input id="addfeed-input" class="field" type="text" placeholder="add feed URL…" autocomplete="off" spellcheck="false">
        </form>
        <button id="btn-import" class="btn-link" type="button" title="Import OPML">import</button>
        <button id="btn-export" class="btn-link" type="button" title="Export OPML">export</button>
        <input id="opml-file" type="file" accept=".opml,.xml,text/xml,application/xml" hidden>
        <div class="keyhint"><kbd>j</kbd><kbd>k</kbd><kbd>r</kbd><kbd>s</kbd><kbd>e</kbd><kbd>?</kbd></div>
      </div>
    </div>

    <div class="stream" id="stream"></div>

    <div class="statusbar">
      <div class="left">
        <span class="stat"><span class="dot" id="vfs-dot" data-state="pending"></span><span id="backend-status">store: …</span></span>
        <span id="poll-status">idle</span>
      </div>
      <div class="right">
        <span id="bridge-status">bridge: …</span>
        <span id="persist-status">—</span>
        <span>store <span id="storage-usage">— / —</span></span>
        <span id="weir-version">weir</span>
      </div>
    </div>
  </main>
</div>
