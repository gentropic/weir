# Build the single-file weir (index.html) and deploy it to GitHub Pages, along
# with the PWA assets (manifest, service worker, icons). Keeps the built artifact
# out of git — CI produces it fresh on every push.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

name: Deploy weir to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build single-file app
        run: node build.js
      - name: Stage site (app + PWA assets)
        run: |
          mkdir -p _site
          cp index.html manifest.webmanifest sw.js icon.svg icon-maskable.svg _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
